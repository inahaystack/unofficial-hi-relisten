name: Publish Feed

on:
  # Run every day at 04:00 UTC for testing
  schedule:
    - cron: "0 4 * * *"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push feed.xml back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install python-dateutil

      - name: Generate feed.xml
        run: python3 generate_feed.py

      - name: Commit and push feed.xml
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          # Only commit if something changed
          git diff --cached --quiet || git commit -m "chore: publish feed $(date -u +%Y-%m-%d)"
          git push
